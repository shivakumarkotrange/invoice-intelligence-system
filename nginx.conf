upstream invoice_api {
    least_conn;
    server invoice-api:8000 max_fails=3 fail_timeout=30s;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

server {
    listen 80;
    server_name _;
    
    # Redirect HTTP to HTTPS (if you have SSL configured)
    # return 301 https://$server_name$request_uri;
    
    client_max_body_size 50M;
    proxy_read_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;

    # Main API endpoint
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://invoice_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "upgrade";
        
        # Buffering settings for large uploads
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Upload endpoint (stricter rate limiting)
    location /process-invoice {
        limit_req zone=upload_limit burst=5 nodelay;
        
        proxy_pass http://invoice_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://invoice_api;
    }

    # API documentation
    location /docs {
        proxy_pass http://invoice_api/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://invoice_api/redoc;
        proxy_set_header Host $host;
    }

    # Deny access to temp uploads from outside
    location /temp_uploads {
        return 403;
    }
}

